version: '3.9'

services:
  postgres:
    image: postgres:14.21-trixie
    container_name: my-postgres
    restart: unless-stopped          # auto-restart unless you manually stop it
    environment:
      POSTGRES_PASSWORD: Hello@123
      # POSTGRES_DB: employee
      # Optional: set a custom username (default is 'postgres')
      # POSTGRES_USER: myuser
    ports:
      - "5432:5432"                  # host:container
    volumes:
      # Option 1: Named volume (Docker manages it – recommended)
      # - pgdata:/var/lib/postgresql/data

      # Option 2: Bind mount to D: drive (uncomment if you prefer)
      - //d/pgdata:/var/lib/postgresql/data

    # Optional: healthcheck (good practice)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
  # Optional: limit resources (good if laptop gets hot/slow)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
  mssql-2019:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: mssql-2019
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      MSSQL_SA_PASSWORD: Hello@123
    ports:
      - "1433:1433"                # MySQL port on your host
    volumes:
      # Option A: Named volume
       - mssql2019-data:/var/opt/mssql
      # Option B: On D: drive (uncomment & create D:\mysqldata first)
     # - //d/mssql-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P ${MSSQL_SA_PASSWORD} -Q "SELECT 1" || exit 1
      interval: 15s
      timeout: 10s
      retries: 5

  zookeeper:
      image: confluentinc/cp-zookeeper:7.5.0
      container_name: zookeeper
      restart: unless-stopped
      ports:
        - "2181:2181"
      environment:
        ZOOKEEPER_CLIENT_PORT: 2181
        ZOOKEEPER_TICK_TIME: 2000
      healthcheck:
        test: ["CMD", "nc", "-z", "localhost", "2181"]   # or use echo ruok | nc
        interval: 10s
        timeout: 5s
        retries: 15
        start_period: 30s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  connect:
    image: confluentinc/cp-kafka-connect:7.5.0
    container_name: connect
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: "kafka:9092"          # ← Fixed
      CONNECT_REST_ADVERTISED_HOST_NAME: "connect"
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: "connect-group"
      CONNECT_CONFIG_STORAGE_TOPIC: "connect-configs"
      CONNECT_OFFSET_STORAGE_TOPIC: "connect-offsets"
      CONNECT_STATUS_STORAGE_TOPIC: "connect-status"
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_PLUGIN_PATH: "/usr/share/java,/usr/share/confluent-hub-components"
      CONNECT_OFFSET_FLUSH_INTERVAL_MS: 10000
      CONNECT_KEY_CONVERTER: "org.apache.kafka.connect.storage.StringConverter"
      CONNECT_VALUE_CONVERTER: "org.apache.kafka.connect.storage.StringConverter"
      CONNECT_INTERNAL_KEY_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_INTERNAL_VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
    command:
      - bash
      - -c
      - |
        echo "Waiting for Kafka to be ready..."
        cub kafka-ready -b kafka:9092 1 60 || exit 1
        echo "Kafka is ready. Installing JDBC connector..."
        confluent-hub install --no-prompt confluentinc/kafka-connect-jdbc:latest
        echo "Downloading PostgreSQL JDBC driver..."
        wget https://jdbc.postgresql.org/download/postgresql-42.7.3.jar \
          -P /usr/share/confluent-hub-components/confluentinc-kafka-connect-jdbc/lib/
        echo "Starting Kafka Connect..."
        /etc/confluent/docker/run

  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      # Optional: persist provisioning & dashboards
      # - ./grafana/provisioning:/etc/grafana/provisioning
      # - ./grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123        # change this in production!
      - GF_USERS_ALLOW_SIGN_UP=false
      # Optional: disable telemetry
      - GF_ANALYTICS_REPORTING_ENABLED=false
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
# Define the named volume (persists even if container is removed)
volumes:
  pgdata:
  mssql2019-data:
  grafana-data: